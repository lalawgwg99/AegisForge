[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aegisforge"
version = "0.3.2"
description = "Agent Reliability OS with causal memory, verifiable safety gate, and benchmark pack"
requires-python = ">=3.9"

[project.scripts]
aegisforge = "aegisforge.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
